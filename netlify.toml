[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/blog"
  to = "/blog/"
  status = 301

[[redirects]]
  from = "/tag/*"
  to = "/tag/:splat/"
  status = 301

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml"
